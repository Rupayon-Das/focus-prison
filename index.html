<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus Prison</title>
  <style>
    body { margin: 0; padding: 0; background: #1e1e2e; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; padding: 20px; box-sizing: border-box; }
    input { width: 80%; max-width: 600px; padding: 10px; font-size: 16px; background: #313244; color: white; border: 1px solid #45475a; border-radius: 5px; }
    .time-container { display: flex; flex-direction: column; gap: 10px; width: 80%; max-width: 600px; }
    .time-row { display: flex; align-items: center; gap: 15px; background: #252538; padding: 10px; border-radius: 6px; border: 1px solid #313244; }
    .time-row label { font-size: 14px; font-weight: bold; min-width: 110px; color: #cdd6f4; }
    .time-inputs { display: flex; gap: 10px; flex-grow: 1; }
    .time-inputs input { width: 100%; padding: 8px; font-size: 14px; }
    button { padding: 15px 40px; font-size: 18px; background: #f38ba8; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    #lockdown { display: none; height: 100vh; flex-direction: column; }
    #timerBar { height: 40px; background: #f38ba8; color: black; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; transition: background 0.3s ease; }
    #tabBar { display: flex; align-items: center; background: #181825; padding: 5px 5px 0 5px; gap: 5px; flex-shrink: 0; }
    .tab-button { background: #313244; color: #cdd6f4; border: none; padding: 8px 15px; border-radius: 5px 5px 0 0; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; max-width: 200px; }
    .tab-button.active { background: #1e1e2e; }
    .tab-button span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-close { background: transparent; border: none; color: #a6adc8; cursor: pointer; font-size: 16px; padding: 0; }
    .tab-close:hover { color: #f38ba8; }
    #newTabBtn { background: transparent; color: #cdd6f4; border: none; font-size: 20px; cursor: pointer; padding: 5px 10px; }
    #navBar { height: 40px; background: #181825; display: flex; align-items: center; padding: 0 15px; gap: 15px; flex-shrink: 0; border-bottom: 1px solid #313244; }
    #navBar button { background: #313244; color: #cdd6f4; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; }
    #navBar button:hover { background: #45475a; }
    #currentUrl { color: #a6adc8; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #webviewContainer { flex-grow: 1; position: relative; background: #11111b; overflow: hidden; }
    .browser-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; pointer-events: none; background-color: #11111b; }
    .browser-view.active { z-index: 2; pointer-events: all; }
    #timeUp { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; z-index: 9999; background: #1e1e2e; }
    #timeUp h1 { font-size: 5em; color: #a6e3a1; margin: 0; }
  </style>
</head>
<body>
  <div id="setup">
    <h1>🔒 Focus Prison</h1>
    <p>Enter EXACT URLs (comma separated). YouTube playlists will be strictly enforced.</p>
    <input type="text" id="urlInput" placeholder="https://www.youtube.com/playlist?list=PLxxxxxx, https://chat.deepseek.com">
    
    <div class="time-container">
      <div class="time-row">
        <label>⏳ Study Block:</label>
        <div class="time-inputs">
          <input type="number" id="studyMin" placeholder="Minutes" min="0" value="0">
          <input type="number" id="studySec" placeholder="Seconds" min="0" max="59" value="10">
        </div>
      </div>
      <div class="time-row">
        <label>☕ Break Block:</label>
        <div class="time-inputs">
          <input type="number" id="breakMin" placeholder="Minutes" min="0" value="0">
          <input type="number" id="breakSec" placeholder="Seconds" min="0" max="59" value="5">
        </div>
      </div>
      <!-- 🚀 NEW FIELD: Set exact total targets for your study rounds -->
      <div class="time-row">
        <label>🔄 Total Rounds:</label>
        <div class="time-inputs">
          <input type="number" id="roundsInput" placeholder="Total Loops (e.g. 4)" min="1" value="2">
        </div>
      </div>
    </div>
    
    <button id="startBtn">Initiate Lockdown</button>
  </div>
  
  <div id="lockdown">
    <div id="timerBar" style="position: relative;">
      <span><span id="timerPrefix">LOCKDOWN ACTIVE</span>: <span id="timer" style="margin-left: 15px;">--:--</span> remaining</span>
      <span id="batteryStatus" style="position: absolute; right: 20px; font-size: 16px; font-weight: normal;">🔋 --%</span>
    </div>
    <div id="tabBar"><div id="tabButtons" style="display: flex; gap: 5px;"></div><button id="newTabBtn">+</button></div>
    <div id="navBar"><button id="backBtn">← Back</button><button id="fwdBtn">Forward →</button><button id="reloadBtn">↻ Reload</button><span id="currentUrl"></span></div>
    <div id="webviewContainer"></div>
  </div>
  
  <div id="timeUp">
    <h1>TIME IS UP!</h1>
    <p style="font-size: 2em; margin-top: 20px;">You are now free. Closing application...</p>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');

    const setupDiv = document.getElementById('setup');
    const lockdownDiv = document.getElementById('lockdown');
    const timeUpDiv = document.getElementById('timeUp');
    const startBtn = document.getElementById('startBtn');
    const urlInput = document.getElementById('urlInput');
    
    const studyMin = document.getElementById('studyMin');
    const studySec = document.getElementById('studySec');
    const breakMin = document.getElementById('breakMin');
    const breakSec = document.getElementById('breakSec');
    const roundsInput = document.getElementById('roundsInput'); // Target element selector
    
    const timerSpan = document.getElementById('timer');
    const timerPrefix = document.getElementById('timerPrefix');
    const timerBar = document.getElementById('timerBar');
    const tabButtonsDiv = document.getElementById('tabButtons');
    const newTabBtn = document.getElementById('newTabBtn');
    const webviewContainer = document.getElementById('webviewContainer');
    const currentUrlSpan = document.getElementById('currentUrl');
    const backBtn = document.getElementById('backBtn');
    const fwdBtn = document.getElementById('fwdBtn');
    const reloadBtn = document.getElementById('reloadBtn');

    let allowedUrls = [];
    let endTime = 0; let interval; let tabCounter = 0; let activeTab = null; let tabs = [];
    
    let currentMode = 'study';
    let studyTotalMs = 0;
    let breakTotalMs = 0;
    
    // Tracking engine counters
    let targetRounds = 1;
    let currentRound = 1;

    const PARTITION = 'persist:ddg_auth';

    let lowBatteryNotified = false;
    let fullBatteryNotified = false;

    if (navigator.getBattery) {
      navigator.getBattery().then(battery => {
        function updateBatteryInfo() {
          const percentage = Math.round(battery.level * 100);
          const isCharging = battery.charging;
          const statusText = isCharging ? `🔌 ${percentage}% (Charging)` : `🔋 ${percentage}%`;
          const targetNode = document.getElementById('batteryStatus');
          if (targetNode) targetNode.innerText = statusText;

          if (battery.level <= 0.15 && !isCharging && !lowBatteryNotified) {
            ipcRenderer.send('notify-battery', { title: '🔋 Battery Running Low!', body: `Battery dropped to ${percentage}%. Plug in your charger.` });
            lowBatteryNotified = true;
          } else if (battery.level > 0.20) { lowBatteryNotified = false; }

          if (percentage === 100 && isCharging && !fullBatteryNotified) {
            ipcRenderer.send('notify-battery', { title: '🔌 Battery Fully Charged!', body: 'Battery is at 100%. Unplug whenever you want.' });
            fullBatteryNotified = true;
          } else if (percentage < 100) { fullBatteryNotified = false; }
        }
        updateBatteryInfo();
        battery.addEventListener('levelchange', updateBatteryInfo);
        battery.addEventListener('chargingchange', updateBatteryInfo);
      });
    }

    ipcRenderer.on('google-login-closed', () => { if (activeTab && activeTab.webview) activeTab.webview.reload(); });

    function formatUrl(u) {
      u = u.trim();
      if (!u.startsWith('http://') && !u.startsWith('https://')) u = 'https://' + u;
      try { let parsed = new URL(u); if (parsed.hostname.split('.').length <= 2) { parsed.hostname = 'www.' + parsed.hostname; u = parsed.toString(); } } catch(e) {}
      return u;
    }

    function getBaseDomain(hostname) {
      const parts = hostname.split('.');
      return parts.length > 2 ? parts.slice(-2).join('.') : hostname;
    }

    startBtn.addEventListener('click', () => {
      let rawUrls = urlInput.value.split(',').map(u => u.trim()).filter(u => u !== '');
      
      let sMin = parseInt(studyMin.value) || 0;
      let sSec = parseInt(studySec.value) || 0;
      let bMin = parseInt(breakMin.value) || 0;
      let bSec = parseInt(breakSec.value) || 0;

      studyTotalMs = ((sMin * 60) + sSec) * 1000;
      breakTotalMs = ((bMin * 60) + bSec) * 1000;
      targetRounds = parseInt(roundsInput.value) || 1;
      
      if (rawUrls.length === 0 || studyTotalMs <= 0) { 
        alert("You must provide valid URLs and a study block longer than 0 seconds."); 
        return; 
      }
      
      allowedUrls = rawUrls.map(formatUrl);
      currentMode = 'study';
      currentRound = 1; // Reset round position tracking indicators
      endTime = Date.now() + studyTotalMs;
      
      ipcRenderer.send('lock-window');
      setupDiv.style.display = 'none'; lockdownDiv.style.display = 'flex';
      createTab(allowedUrls[0]);
      updateTimer(); interval = setInterval(updateTimer, 1000);
    });

    newTabBtn.addEventListener('click', () => createTab(null));

    function createTab(url) {
      const id = tabCounter++;
      const tabObj = { id: id, lastGoodUrl: url, isEnforcing: false };

      const tabBtn = document.createElement('button');
      tabBtn.className = 'tab-button'; tabBtn.dataset.id = id;
      tabBtn.innerHTML = `<span>${url ? 'Loading...' : 'New Tab'}</span> <button class="tab-close">×</button>`;
      tabBtn.querySelector('.tab-close').addEventListener('click', (e) => { e.stopPropagation(); closeTab(id); });
      tabBtn.addEventListener('click', () => switchToTab(id));
      tabButtonsDiv.appendChild(tabBtn); tabObj.tabBtn = tabBtn;

      const rawPath = path.join(__dirname, 'preload.js');
      const normalizedPreloadPath = 'file://' + rawPath.replace(/\\/g, '/');

      const webview = document.createElement('webview');
      webview.className = 'browser-view';
      webview.allowpopups = true;
      webview.allowfullscreen = true;
      webview.setAttribute('partition', PARTITION);
      webview.setAttribute('webpreferences', 'nodeIntegration=no, contextIsolation=yes, webSecurity=true');
      webview.setAttribute('preload', normalizedPreloadPath);

      webviewContainer.appendChild(webview);
      tabObj.webview = webview;
      attachListeners(tabObj);
      tabs.push(tabObj);
      switchToTab(id);

      if (url) webview.src = url; else showStartPage(tabObj);
    }

    function closeTab(id) {
      if (tabs.length <= 1) { alert("You cannot close the last tab."); return; }
      const index = tabs.findIndex(t => t.id === id);
      if (index === -1) return;
      tabs[index].tabBtn.remove(); tabs[index].webview.remove();
      tabs.splice(index, 1);
      if (activeTab && activeTab.id === id) switchToTab(tabs[0].id);
    }

    function switchToTab(id) {
      const tabObj = tabs.find(t => t.id === id);
      if (!tabObj) return;
      activeTab = tabObj;
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.browser-view').forEach(wv => wv.classList.remove('active'));
      tabObj.tabBtn.classList.add('active'); tabObj.webview.classList.add('active');
      updateNavBar();
    }

    function showStartPage(tabObj) {
      const startHtml = `
        <body style="background: #1e1e2e; color: white; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
          <h2>Where do you want to go?</h2>
          <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            ${allowedUrls.map(u => `<a style="background: #313244; color: #cdd6f4; padding: 15px 30px; border-radius: 8px; font-size: 18px; text-decoration: none; cursor: pointer; border: 1px solid #45475a; width: 300px; text-align: center;" href="${u}">${u}</a>`).join('')}
          </div>
        </body>`;
      tabObj.webview.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(startHtml);
    }

    backBtn.addEventListener('click', () => { if (activeTab && activeTab.webview.canGoBack()) activeTab.webview.goBack(); });
    fwdBtn.addEventListener('click', () => { if (activeTab && activeTab.webview.canGoForward()) activeTab.webview.goForward(); });
    reloadBtn.addEventListener('click', () => { if (activeTab) activeTab.webview.reload(); });

    function updateNavBar() { if (activeTab) currentUrlSpan.innerText = activeTab.webview.src.startsWith('data:') ? 'Start Page' : activeTab.webview.src; }

    function updateTimer() {
      const remaining = endTime - Date.now();
      
      if (remaining <= 0) {
        if (currentMode === 'study') {
          // 🚀 CHECK ROUND LIMITATION: If we hit our round target during study, end the session immediately
          if (currentRound >= targetRounds) {
            clearInterval(interval); timerSpan.innerText = "00:00";
            lockdownDiv.style.display = 'none'; timeUpDiv.style.display = 'flex';
            ipcRenderer.send('unlock-window'); setTimeout(() => window.close(), 4000);
            return;
          }
          
          if (breakTotalMs > 0) {
            currentMode = 'break';
            endTime = Date.now() + breakTotalMs;
            timerBar.style.background = '#a6e3a1'; 
            ipcRenderer.send('start-break');
          } else {
            // Drop back fallback if breaks are left empty but target round limits are still higher
            currentRound++;
            endTime = Date.now() + studyTotalMs;
          }
        } else if (currentMode === 'break') {
          // 🚀 ADVANCE ROUND INDEX: Step up to the next round as break state collapses
          currentRound++;
          currentMode = 'study';
          endTime = Date.now() + studyTotalMs;
          timerBar.style.background = '#f38ba8'; 
          ipcRenderer.send('lock-window');
        }
        return;
      }
      
      const totalSecs = Math.ceil(remaining / 1000);
      const mins = Math.floor(totalSecs / 60); 
      const secs = totalSecs % 60;
      
      // Update top bar title text string to display active current round tracking index natively
      timerPrefix.innerText = currentMode === 'study' ? `LOCKDOWN ACTIVE (Round ${currentRound}/${targetRounds})` : `BREAK ACTIVE (Round ${currentRound}/${targetRounds})`;
      timerSpan.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function isUrlAllowed(rawUrl) {
      if (!rawUrl || rawUrl === 'about:blank' || rawUrl.startsWith('data:text/html')) return true;
      try {
        const target = new URL(rawUrl); const host = target.hostname;
        if (host.endsWith('.google.com') || host.endsWith('.googleapis.com') || host.endsWith('.gstatic.com') || host === 'accounts.google.com' || host === 'mail.google.com') return true;
        return allowedUrls.some(allowedStr => {
          const allowed = new URL(allowedStr);
          if (getBaseDomain(host) !== getBaseDomain(allowed.hostname)) return false;
          if (allowed.hostname.includes('youtube.com')) {
            const playlistId = allowed.searchParams.get('list');
            if (playlistId) return (target.pathname === '/playlist' || target.pathname === '/watch') && target.searchParams.get('list') === playlistId;
          }
          if (allowed.pathname !== '/' && !target.pathname.startsWith(allowed.pathname)) return false;
          return true;
        });
      } catch (e) { return false; }
    }

    function attachListeners(tabObj) {
      const webview = tabObj.webview;
      webview.addEventListener('permissionrequest', (e) => { if (e.permission === 'popups') e.request.allow(); });

      webview.addEventListener('will-navigate', (e) => {
        if (tabObj.isEnforcing) return;
        if (e.isMainFrame) {
          const url = e.url;
          if (url.includes('accounts.google.com') && !url.includes('logout')) {
            e.preventDefault(); ipcRenderer.send('open-manual-auth', url); return;
          }
          if (tabObj === activeTab) currentUrlSpan.innerText = e.url;
          if (url.includes('google.com') || url.includes('gstatic.com') || url.includes('googleapis.com')) {
            tabObj.lastGoodUrl = url; tabObj.tabBtn.querySelector('span').innerText = url.replace('https://www.', '').split('/')[0]; return;
          }
          if (!isUrlAllowed(url)) { e.preventDefault(); enforcePrison(tabObj); } 
          else { tabObj.lastGoodUrl = url; tabObj.tabBtn.querySelector('span').innerText = url.replace('https://www.', '').split('/')[0]; }
        }
      });

      webview.addEventListener('did-navigate-in-page', (e) => {
        if (tabObj.isEnforcing) return;
        if (e.isMainFrame) {
          if (tabObj === activeTab) currentUrlSpan.innerText = e.url;
          if (!isUrlAllowed(e.url)) enforcePrison(tabObj); else tabObj.lastGoodUrl = e.url;
        }
      });

      webview.addEventListener('new-window', (e) => {
        const url = e.url;
        if (url.includes('accounts.google.com') && (url.includes('oauth2') || url.includes('client_id') || url.includes('gsi'))) return; 
        e.preventDefault();
        if (url.includes('accounts.google.com/signin') || url.includes('accounts.google.com/ServiceLogin')) {
          ipcRenderer.send('open-manual-auth', url); return;
        }
        if (url.includes('google.com') || url.includes('gstatic.com') || url.includes('googleapis.com')) {
          webview.loadURL(url); webview.focus(); return;
        }
        if (isUrlAllowed(url)) createTab(url);
      });

      webview.addEventListener('did-fail-load', (e) => {
        if (e.errorCode === -3) return;
        webview.executeJavaScript(`document.body.innerHTML = '<div style="color:#f38ba8;font-family:sans-serif;padding:20px;text-align:center;"><h3>Error loading page</h3><p>${e.errorDescription} (${e.errorCode})</p></div>';`).catch(()=>{});
      });
    }

    function enforcePrison(tabObj) {
      if (tabObj.isEnforcing) return;
      tabObj.isEnforcing = true;
      if (tabObj.lastGoodUrl && !tabObj.lastGoodUrl.startsWith('data:')) tabObj.webview.loadURL(tabObj.lastGoodUrl);
      else showStartPage(tabObj);
      setTimeout(() => { tabObj.isEnforcing = false; }, 1500);
    }
  </script>
</body>
</html>
